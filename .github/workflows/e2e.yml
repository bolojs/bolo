name: E2E Tests

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:
  schedule:
    - cron: '0 2 * * *'

jobs:
  e2e:
    name: E2E Tests
    runs-on: ubuntu-latest

    env:
      DEMO_URL: http://localhost:4321/e2e/

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 10.26.1

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install

      - name: Build packages
        run: pnpm build

      - name: Install Gauge CLI
        run: npm install -g @getgauge/cli

      # The demo lives as a Solid island inside apps/site/landing, served at the
      # hidden /e2e harness route. Pin the port directly via astro rather
      # than the portless-wrapped `pnpm dev` script, which assigns ports
      # nondeterministically.
      - name: Start landing app
        run: |
          cd apps/site/landing
          pnpm exec astro dev --port 4321 &
          echo $! > /tmp/demo.pid
          for i in {1..30}; do
            if curl -s "$DEMO_URL" > /dev/null; then
              echo "Landing app is ready"
              break
            fi
            echo "Waiting for landing app... ($i/30)"
            sleep 2
          done

      - name: Install Playwright Chromium
        run: pnpm exec playwright install --with-deps chromium
        working-directory: tests/e2e

      - name: Run E2E tests
        run: |
          cd tests/e2e
          gauge run specs --tags='!wip'

      - name: Stop landing app
        if: always()
        run: |
          if [ -f /tmp/demo.pid ]; then
            kill $(cat /tmp/demo.pid) || true
          fi

      - name: Upload E2E test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-reports
          path: |
            tests/e2e/reports/
            tests/e2e/logs/
            tests/e2e/screenshots/
          retention-days: 7
