name: Deploy to Cloudflare Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

jobs:
  deploy:
    name: Build and deploy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 10.26.1

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build all apps
        env:
          SITE_DOMAIN: ${{ vars.SITE_DOMAIN }}
        run: |
          pnpm turbo run build \
            --filter=@bolojs/site-landing \
            --filter=@bolojs/site-compat \
            --filter=@bolojs/site-docs

      - name: Assemble merged site
        run: |
          mkdir -p deploy
          cp -r apps/site/landing/dist/* deploy/
          mkdir -p deploy/compat && cp -r apps/site/compat/dist/* deploy/compat/
          mkdir -p deploy/docs && cp -r apps/site/docs/dist/* deploy/docs/
          cp apps/site/_headers deploy/_headers
          cp apps/site/_redirects deploy/_redirects
          rm -f deploy/compat/_headers deploy/docs/_headers

      - name: Install wrangler
        run: npm install -g wrangler

      - name: Deploy to Cloudflare Pages
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: wrangler pages deploy ./deploy --project-name=bolojs

  deploy-demo:
    name: Build and deploy demo
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 10.26.1

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build app-builder
        run: pnpm turbo run build --filter=@bolojs/example-app-builder

      - name: Install wrangler
        run: npm install -g wrangler

      - name: Deploy to Cloudflare Pages
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: wrangler pages deploy ./examples/app-builder/dist --project-name=bolojs-demo
